name: Daily AI Builders Newsletter

# Triggered once after adding DEEPSEEK_API_KEY to verify model-generated summaries.

on:
  schedule:
    - cron: "10 5 * * *"
    - cron: "30 5 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/daily-newsletter.yml"
      - "scripts/cloud-daily-newsletter.mjs"

permissions:
  contents: write

concurrency:
  group: daily-ai-builders-newsletter
  cancel-in-progress: false

jobs:
  build-publish-email:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check today's newsletter state
        id: today
        run: |
          date="$(TZ=Asia/Shanghai date +%F)"
          echo "date=$date" >> "$GITHUB_OUTPUT"
          if [ -f newsletter-date.txt ] && [ "$(cat newsletter-date.txt)" = "$date" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEND_EMAIL: "false"
        run: node scripts/cloud-daily-newsletter.mjs

      - name: Commit generated newsletter
        id: publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f ai-builders-digest-*.html 2>/dev/null || true
          git add index.html newsletter-date.txt archive
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Publish daily AI Builders newsletter"
            git pull --rebase origin main
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send public link by email
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.today.outputs.already_published != 'true')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/cloud-daily-newsletter.mjs
