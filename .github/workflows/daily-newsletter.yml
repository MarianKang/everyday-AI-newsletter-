name: Daily AI Builders Newsletter

# Triggered once after adding DEEPSEEK_API_KEY to verify model-generated summaries.

on:
  schedule:
    # GitHub cron uses UTC. Primary sends are 13:10 and 13:30 in Asia/Shanghai.
    - cron: "10 5 * * *"
    - cron: "30 5 * * *"
    # Same-day catch-up checks. GitHub scheduled runs can be delayed or dropped;
    # these prevent missing a day while newsletter-date.txt prevents duplicates.
    - cron: "0 6-15 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/daily-newsletter.yml"
      - "scripts/cloud-daily-newsletter.mjs"

permissions:
  contents: write

concurrency:
  group: daily-ai-builders-newsletter
  cancel-in-progress: false

jobs:
  build-publish-email:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check scheduled send window
        id: send_window
        run: |
          hhmm="$(TZ=Asia/Shanghai date +%H%M)"
          schedule="${{ github.event.schedule }}"
          echo "hhmm=$hhmm" >> "$GITHUB_OUTPUT"
          echo "schedule=$schedule" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ] \
            && { [ "$schedule" = "10 5 * * *" ] || [ "$schedule" = "30 5 * * *" ] || [ "$schedule" = "0 6-15 * * *" ]; } \
            && [ "$hhmm" -ge 1310 ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check today's newsletter state
        id: today
        if: steps.send_window.outputs.allowed == 'true'
        run: |
          date="$(TZ=Asia/Shanghai date +%F)"
          echo "date=$date" >> "$GITHUB_OUTPUT"
          if [ -f newsletter-date.txt ] && [ "$(cat newsletter-date.txt)" = "$date" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate newsletter
        if: steps.send_window.outputs.allowed == 'true' && (github.event_name == 'workflow_dispatch' || steps.today.outputs.already_published != 'true')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEND_EMAIL: "false"
        run: node scripts/cloud-daily-newsletter.mjs

      - name: Commit generated newsletter
        id: publish
        if: steps.send_window.outputs.allowed == 'true' && (github.event_name == 'workflow_dispatch' || steps.today.outputs.already_published != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f ai-builders-digest-*.html 2>/dev/null || true
          git add index.html newsletter-date.txt newsletter-state.json archive
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Publish daily AI Builders newsletter"
            git pull --rebase origin main
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send public link by email
        if: steps.publish.outputs.published == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          node --input-type=module <<'NODE'
          const apiKey = process.env.RESEND_API_KEY;
          if (!apiKey) throw new Error("RESEND_API_KEY is required to send email.");
          const date = new Intl.DateTimeFormat("en-CA", {
            timeZone: "Asia/Shanghai",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          }).format(new Date());
          const title = `Everyday AI Newsletter｜${date}`;
          const url = `https://mariankang.github.io/everyday-AI-newsletter-/archive/ai-builders-digest-${date}.html`;
          const response = await fetch("https://api.resend.com/emails", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
              from: "AI Builders Digest <digest@resend.dev>",
              to: ["kt951218@163.com"],
              subject: title,
              text: `${title}\n\n公网 HTML 链接：${url}\n\n这个链接可以在其他电脑和手机上打开。`,
            }),
          });
          const body = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(`Resend API error: ${body.message || response.status}`);
          console.log(`Sent ${body.id || url}`);
          NODE
