name: Daily AI Builders Newsletter

# Triggered once after adding DEEPSEEK_API_KEY to verify model-generated summaries.

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/daily-newsletter.yml"
      - "scripts/cloud-daily-newsletter.mjs"

permissions:
  contents: write

jobs:
  build-publish-email:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEND_EMAIL: "false"
        run: node scripts/cloud-daily-newsletter.mjs

      - name: Commit generated newsletter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ai-builders-digest-*.html
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit."
          else
            git commit -m "Publish daily AI Builders newsletter"
            git pull --rebase origin main
            git push
          fi

      - name: Send public link by email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/cloud-daily-newsletter.mjs
